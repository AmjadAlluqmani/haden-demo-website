<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emotion Detection</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <a href="index.html" class="back-btn">← Back</a>

    <div class="container">
      <h1>Emotion Detection</h1>

      <p class="subtitle">Real-time facial emotion analysis.</p>

      <video id="video" autoplay playsinline></video>

      <div class="emotion-box">
        <h2 id="emotion">Waiting...</h2>
        <p id="confidence"></p>

        <div class="live-confidence">
          <div id="live-bar" class="live-bar"></div>
        </div>
      </div>

      <div class="emotion-chart-box">
        <h2>Emotion Statistics</h2>
        <div id="emotion-chart"></div>

        <div class="pie-wrapper">
          <div id="pie-chart" class="pie-chart"></div>
        </div>
      </div>
    </div>

    <script src="face.js"></script>
  </body>
</html>
